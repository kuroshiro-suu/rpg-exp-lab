<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RPG EXP Lab</title>

  <link rel="stylesheet" href="./style.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#f7f7f2" />
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="appTitle">RPG EXP Lab</div>
      <div class="subTitle">経験値カーブ・ステージ別EXP目安</div>
    </section>

    <section class="card">
      <h2>基本設定</h2>

      <label>
        <span>ゲーム名</span>
        <input id="gameName" type="text" placeholder="例：灰の門の迷宮" />
      </label>

      <div class="grid2">
        <label>
          <span>最大Lv</span>
          <input id="maxLevel" type="number" min="2" placeholder="99" />
        </label>

        <label>
          <span>Lv1→2必要EXP</span>
          <input id="baseExp" type="number" min="1" placeholder="40" />
        </label>
      </div>

      <div class="grid2">
        <label>
          <span>必要EXP増加率</span>
          <input id="growthRate" type="number" step="0.01" placeholder="1.12" />
        </label>

        <label>
          <span>プラス係数</span>
          <input id="plusCoef" type="number" step="1" placeholder="5" />
        </label>
      </div>

      <div class="grid2">
        <label>
          <span>増加率停止Lv</span>
          <input id="growthStopLevel" type="number" min="1" placeholder="50" />
        </label>

        <label>
          <span>プラス係数停止Lv</span>
          <input id="plusStopLevel" type="number" min="1" placeholder="75" />
        </label>
      </div>

      <div class="grid2">
        <label>
          <span>丸め単位</span>
          <select id="roundUnit">
            <option value="">選択</option>
            <option value="1">1</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>

        <label>
          <span>ステージ数</span>
          <input id="stageCount" type="number" min="0" max="30" placeholder="7" />
        </label>
      </div>

      <div class="buttonRow">
        <button id="makeStagesButton">ステージ欄を作成</button>
      </div>
    </section>

    <section class="card">
      <h2>ステージ設定</h2>
      <div id="stageInputs" class="stageInputs emptyText">
        ステージ数を入力して「ステージ欄を作成」を押してください。
      </div>
    </section>

    <section class="card">
      <h2>操作</h2>

      <div class="buttonGrid">
        <button id="calcButton" class="primary">計算</button>
        <button id="copyCsvButton">CSVコピー</button>
        <button id="saveButton">端末に保存</button>
        <button id="saveListButton">保存一覧</button>
        <button id="sampleButton">サンプル</button>
        <button id="clearButton" class="dangerButton">初期化</button>
      </div>

      <div id="message" class="message"></div>

      <div class="note">
        保存データは、この端末のブラウザ内に保存されます。<br>
        ブラウザデータやサイトデータを削除すると、保存内容も消えます。
      </div>

      <div id="saveList" class="saveList hidden"></div>
    </section>

    <section class="card">
      <h2>ステージ別まとめ</h2>
      <div id="stageSummary" class="stageSummary emptyText">
        計算すると、ステージごとの1戦EXP目安が表示されます。
      </div>
    </section>

    <section class="card">
      <h2>Lv詳細</h2>
      <div class="legend">Lv　次　累計　St</div>
      <div id="levelList" class="levelList emptyText">
        計算すると、Lvごとの必要EXPが表示されます。
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
